<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KOI Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; gap: 24px; padding: 24px; }
    h1 { font-size: 2rem; color: #f0a500; text-align: center; }
    .links { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 320px; }
    a { display: block; color: #f0a500; text-decoration: none; font-size: 1.1rem; padding: 18px 24px; border: 1px solid rgba(240,165,0,0.3); border-radius: 12px; text-align: center; min-height: 44px; transition: all 0.2s; -webkit-tap-highlight-color: rgba(240,165,0,0.15); }
    a:hover, a:active { background: rgba(240,165,0,0.1); border-color: #f0a500; }
    p { color: #888; font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
  <h1>🐟 KOI Portfolio</h1>
  <div class="links">
    <a href="mobile/">📱 Mobile Dashboard</a>
    <a href="desktop/">💻 Desktop Dashboard</a>
  </div>
  <p>Password-protected · Updated daily</p>
</body>
</html>
